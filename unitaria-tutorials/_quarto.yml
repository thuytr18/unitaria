project:
  type: website

website:
  title: "Unitaria"
  description: "A collection of tutorials for Unitaria, the open-source framework for linear algebra using block encodings."
  image: unitaria_logo_round.svg
  repo-url: https://github.com/tequilahub/unitaria
  repo-actions: [source, issue]
  navbar:
    logo: unitaria_logo_round.svg
    right:
      - text: "Home"
        file: index.qmd
      - text: "Tutorials"
        file: tutorials.qmd
      - text: "Contribution"
        file: Contribution/Contribution.ipynb
      - text: "Docs"
        url: /docs


  favicon: favicon.ico
  open-graph: true
  cookie-consent:
      type: express
      style: simple 

format:
  html:
    theme:
      light: [flatly, theme-light.scss]
      dark: [darkly, theme-dark.scss]
    css: styles.css

execute:
  freeze: auto
