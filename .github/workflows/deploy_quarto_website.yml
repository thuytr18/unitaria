name: Quarto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          environment-file: unitaria-tutorials/environment.yml
          auto-update-conda: true
          activate-environment: UnitariaTutorials

      - name: Install ipykernel
        run: |
          conda run -n UnitariaTutorials conda install -y ipykernel
          conda run -n UnitariaTutorials python -m ipykernel install --user --name UnitariaTutorials

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.3.450'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Build Sphinx documentation
        run: |
          uv sync --group docs
          uv run make -C docs html

      - name: Build Quarto site
        run: |
          quarto render --output-dir ../_site
        working-directory: unitaria-tutorials

      - name: Copy docs into Quarto site
        run: |
          mkdir -p _site/docs
          cp -r docs/_build/html/* _site/docs/
          
      - name: List workspace and _site contents
        run: |
          echo "Workspace root:" && ls -l
          echo "_site directory:" && ls -l _site || echo "_site does not exist"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5